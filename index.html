<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#1e293b" />
<title>我的课表</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icons/icon-192.png" type="image/png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<main id="app">
  <header id="topbar">
    <h1 id="topbar-title">今天</h1>
    <div id="topbar-sub"></div>
  </header>

  <section id="view-today" class="view active"></section>
  <section id="view-tomorrow" class="view"></section>
  <section id="view-week" class="view"></section>
  <section id="view-settings" class="view">
    <div class="card">
      <h2>导入课表</h2>
      <p class="muted">选择最新的 Excel 课表文件（.xlsx），数据会保存在你的设备本地。</p>
      <label class="btn primary block">
        <input type="file" id="excel-input" accept=".xlsx" hidden />
        选择 Excel 文件
      </label>
      <p id="import-status" class="muted small"></p>
    </div>

    <div class="card">
      <h2>第 1 周周一日期</h2>
      <p class="muted">如果"今天"显示的不对，可能是开学日期推断错误，手动改一下。</p>
      <input type="date" id="week-one-date" />
      <button id="save-week-one" class="btn">保存</button>
    </div>

    <div class="card">
      <h2>课前提醒</h2>
      <p class="muted">两种方式，推荐第一种。</p>
      <button id="export-ics" class="btn primary block">导出到系统日历 (.ics)</button>
      <p class="muted small">下载后在手机上点开，OPPO 日历会自动导入并发送原生提醒。最可靠。</p>
      <hr />
      <label class="row">
        <input type="checkbox" id="enable-notifs" />
        <span>在浏览器打开时也推送通知（不可靠，仅作补充）</span>
      </label>
    </div>

    <div class="card">
      <h2>关于</h2>
      <p class="muted small" id="meta-info">未导入数据</p>
      <button id="clear-data" class="btn danger">清除所有数据</button>
    </div>
  </section>

  <nav id="tabbar">
    <button class="tab active" data-view="today">
      <div class="tab-icon">●</div><div>今天</div>
    </button>
    <button class="tab" data-view="tomorrow">
      <div class="tab-icon">▷</div><div>明天</div>
    </button>
    <button class="tab" data-view="week">
      <div class="tab-icon">▦</div><div>本周</div>
    </button>
    <button class="tab" data-view="settings">
      <div class="tab-icon">⚙</div><div>设置</div>
    </button>
  </nav>
</main>

<script src="vendor/xlsx.full.min.js"></script>
<script src="js/storage.js"></script>
<script src="js/parser.js"></script>
<script src="js/scheduler.js"></script>
<script src="js/notifications.js"></script>
<script src="js/app.js"></script>
<script src="js/sw-register.js"></script>
</body>
</html>
